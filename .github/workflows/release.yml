name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Sync platform adapters
        run: python scripts/sync_platform_adapters.py

      - name: Check adapter sync is clean
        run: git diff --exit-code

      - name: Verify product metadata
        run: python scripts/verify_product_metadata.py

      - name: Run snapshot verification
        run: python doc-for-agent/tests/verify_generator_snapshots.py

      - name: Run CLI doctor
        run: python cli/docforagent.py doctor

      - name: Build package
        run: python -m build --no-isolation

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
